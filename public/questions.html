<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Questions — Whisperia</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div id="navbar"></div>

  <main class="page-content" style="max-width:1200px;margin:0 auto;padding:32px 24px;position:relative;z-index:1">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:16px">
      <h1 style="font-size:1.8rem;font-weight:800">All Questions</h1>
      <a href="/ask.html" class="btn-primary" style="text-decoration:none">✦ Ask Question</a>
    </div>

    <!-- Filters -->
    <div class="glass-card-static" style="padding:20px 24px;margin-bottom:24px;display:flex;gap:12px;flex-wrap:wrap;align-items:center">
      <input type="text" id="search-input" class="form-input" style="flex:1;min-width:200px" placeholder="Search questions...">
      <select id="category-filter" class="form-input" style="width:auto;min-width:180px">
        <option value="">All Categories</option>
      </select>
      <select id="tag-filter" class="form-input" style="width:auto;min-width:160px">
        <option value="">All Tags</option>
      </select>
      <button onclick="loadQuestions(1)" class="btn-primary">Search</button>
    </div>

    <!-- Questions List -->
    <div id="questions-list" style="display:grid;gap:16px">
      <div class="loading-overlay"><div class="spinner"></div></div>
    </div>

    <!-- Pagination -->
    <div id="pagination" class="pagination"></div>
  </main>

  <div id="footer"></div>
  <script src="/js/app.js"></script>
  <script src="/js/components/navbar.js"></script>
  <script src="/js/components/footer.js"></script>
  <script>
    let currentPage = 1;

    document.addEventListener('DOMContentLoaded', async () => {
      renderNavbar(); renderFooter();
      await loadFilters();
      // Check URL params
      const cat = getParam('category');
      const tag = getParam('tag');
      if (cat) document.getElementById('category-filter').value = cat;
      if (tag) document.getElementById('tag-filter').value = tag;
      loadQuestions(1);

      // Enter key search
      document.getElementById('search-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') loadQuestions(1);
      });
    });

    async function loadFilters() {
      try {
        const [catData, tagData] = await Promise.all([api('/tags/categories'), api('/tags')]);
        const catSelect = document.getElementById('category-filter');
        catData.categories.forEach(c => {
          catSelect.innerHTML += `<option value="${c.id}">${escapeHtml(c.name)}</option>`;
        });
        const tagSelect = document.getElementById('tag-filter');
        tagData.tags.forEach(t => {
          tagSelect.innerHTML += `<option value="${t.id}">${escapeHtml(t.name)} (${t.usageCount})</option>`;
        });
      } catch {}
    }

    async function loadQuestions(page) {
      currentPage = page;
      const container = document.getElementById('questions-list');
      container.innerHTML = '<div class="loading-overlay"><div class="spinner"></div></div>';

      const search = document.getElementById('search-input').value;
      const category = document.getElementById('category-filter').value;
      const tag = document.getElementById('tag-filter').value;

      let url = `/questions?page=${page}&limit=10`;
      if (search) url += `&search=${encodeURIComponent(search)}`;
      if (category) url += `&category=${category}`;
      if (tag) url += `&tag=${tag}`;

      try {
        const data = await api(url);
        if (data.questions.length === 0) {
          container.innerHTML = '<div class="empty-state"><h3>No questions found</h3><p>Try a different search or filter</p></div>';
          document.getElementById('pagination').innerHTML = '';
          return;
        }

        container.innerHTML = data.questions.map(q => `
          <a href="/question-detail.html?id=${q.id}" class="glass-card" style="padding:20px 24px;text-decoration:none;display:block">
            <div style="display:flex;gap:16px;align-items:start">
              <div style="display:flex;flex-direction:column;align-items:center;gap:4px;min-width:60px;text-align:center">
                <div style="font-size:1.3rem;font-weight:700;color:var(--color-primary)">${q.answerCount}</div>
                <div style="font-size:0.7rem;color:var(--color-muted)">answers</div>
                <div style="font-size:0.9rem;font-weight:600;color:${q.voteTotal > 0 ? 'var(--color-success)' : 'var(--color-muted)'}">${q.voteTotal > 0 ? '+' : ''}${q.voteTotal}</div>
                <div style="font-size:0.7rem;color:var(--color-muted)">votes</div>
              </div>
              <div style="flex:1;min-width:0">
                <h3 style="font-size:1.05rem;font-weight:600;color:var(--color-text);margin-bottom:6px">${escapeHtml(q.title)}</h3>
                <p style="color:var(--color-muted);font-size:0.85rem;margin-bottom:10px">${escapeHtml(truncate(q.description, 160))}</p>
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                  ${q.tags.map(t => `<span class="tag">${escapeHtml(t.name)}</span>`).join('')}
                  <span style="color:var(--color-muted);font-size:0.8rem;margin-left:auto">${q.author} • ${formatDate(q.createdAt)}</span>
                </div>
              </div>
            </div>
          </a>
        `).join('');

        // Pagination
        renderPagination(data.page, data.totalPages);
      } catch (err) {
        container.innerHTML = `<div class="empty-state"><p>${err.message}</p></div>`;
      }
    }

    function renderPagination(current, total) {
      const el = document.getElementById('pagination');
      if (total <= 1) { el.innerHTML = ''; return; }
      let html = `<button onclick="loadQuestions(${current - 1})" ${current === 1 ? 'disabled' : ''}>← Prev</button>`;
      for (let i = 1; i <= total; i++) {
        if (i === 1 || i === total || (i >= current - 2 && i <= current + 2)) {
          html += `<button onclick="loadQuestions(${i})" class="${i === current ? 'active' : ''}">${i}</button>`;
        } else if (i === current - 3 || i === current + 3) {
          html += `<button disabled>...</button>`;
        }
      }
      html += `<button onclick="loadQuestions(${current + 1})" ${current === total ? 'disabled' : ''}>Next →</button>`;
      el.innerHTML = html;
    }
  </script>
</body>
</html>
