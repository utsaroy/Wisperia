<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Whisperia</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div id="navbar"></div>

  <main class="page-content" style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 200px);padding:40px 24px;position:relative;z-index:1">
    <div class="glass-card-static" style="width:100%;max-width:440px;padding:40px">
      <div style="text-align:center;margin-bottom:32px">
        <span style="font-size:2rem">✦</span>
        <h1 style="font-size:1.8rem;font-weight:800;margin-top:8px" class="gradient-text">Join Whisperia</h1>
        <p style="color:var(--color-muted);font-size:0.9rem;margin-top:8px">Create your account and start learning</p>
      </div>

      <form id="register-form" style="display:flex;flex-direction:column;gap:20px">
        <div>
          <label class="form-label">Username</label>
          <input type="text" id="username" class="form-input" placeholder="Choose a username" required minlength="3" maxlength="50">
        </div>
        <div>
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
        </div>
        <div>
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Create a password (min 6 chars)" required minlength="6">
        </div>
        <div>
          <label class="form-label">Confirm Password</label>
          <input type="password" id="confirm-password" class="form-input" placeholder="Confirm your password" required>
        </div>
        <div id="error-msg" style="color:var(--color-danger);font-size:0.85rem;display:none"></div>
        <button type="submit" class="btn-primary" style="width:100%;justify-content:center;padding:14px" id="register-btn">
          Create Account
        </button>
      </form>

      <p style="text-align:center;color:var(--color-muted);font-size:0.9rem;margin-top:24px">
        Already have an account? <a href="/login.html" style="color:var(--color-primary);text-decoration:none;font-weight:600">Sign In</a>
      </p>
    </div>
  </main>

  <div id="footer"></div>
  <script src="/js/app.js"></script>
  <script src="/js/components/navbar.js"></script>
  <script src="/js/components/footer.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => { renderNavbar(); renderFooter(); });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('register-btn');
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';

      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;
      if (password !== confirm) {
        errEl.textContent = 'Passwords do not match';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled = true; btn.textContent = 'Creating account...';
      try {
        await api('/auth/register', {
          method: 'POST',
          body: {
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            password
          }
        });
        showToast('Account created!', 'success');
        setTimeout(() => navigate('/'), 500);
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
