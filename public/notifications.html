<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications — Whisperia</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div id="navbar"></div>

  <main class="page-content" style="max-width:700px;margin:0 auto;padding:32px 24px;position:relative;z-index:1">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:32px">
      <h1 style="font-size:1.8rem;font-weight:800">Notifications</h1>
      <button onclick="markAllRead()" class="btn-secondary" style="font-size:0.85rem">Mark All Read</button>
    </div>
    <div id="notif-list" style="display:grid;gap:8px">
      <div class="loading-overlay"><div class="spinner"></div></div>
    </div>
  </main>

  <div id="footer"></div>
  <script src="/js/app.js"></script>
  <script src="/js/components/navbar.js"></script>
  <script src="/js/components/footer.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      renderNavbar(); renderFooter();
      const user = await getCurrentUser();
      if (!user) return navigate('/login.html');
      await loadNotifications();
    });

    async function loadNotifications() {
      try {
        const data = await api('/notifications');
        const el = document.getElementById('notif-list');
        if (data.notifications.length === 0) {
          el.innerHTML = '<div class="empty-state"><h3>No notifications</h3><p>You\'re all caught up!</p></div>';
          return;
        }
        el.innerHTML = data.notifications.map(n => `
          <div class="glass-card-static" style="padding:16px 20px;display:flex;align-items:center;gap:12px;${n.isRead ? 'opacity:0.6' : ''}" id="notif-${n.id}">
            <span style="font-size:1.2rem">${n.isRead ? '📭' : '📬'}</span>
            <div style="flex:1">
              <p style="font-size:0.9rem;color:${n.isRead ? 'var(--color-muted)' : 'var(--color-text)'}">${escapeHtml(n.message)}</p>
              <span style="font-size:0.75rem;color:var(--color-muted)">${formatDate(n.createdAt)}</span>
            </div>
            ${!n.isRead ? `<button onclick="markRead(${n.id})" class="btn-ghost" style="font-size:0.75rem">✓</button>` : ''}
          </div>
        `).join('');
      } catch (err) {
        document.getElementById('notif-list').innerHTML = `<div class="empty-state"><p>${err.message}</p></div>`;
      }
    }

    async function markRead(id) {
      try {
        await api(`/notifications/${id}/read`, { method: 'PUT' });
        const el = document.getElementById(`notif-${id}`);
        if (el) { el.style.opacity = '0.6'; }
      } catch (err) { showToast(err.message, 'error'); }
    }

    async function markAllRead() {
      try {
        await api('/notifications/read-all', { method: 'PUT' });
        showToast('All marked as read', 'success');
        await loadNotifications();
      } catch (err) { showToast(err.message, 'error'); }
    }
  </script>
</body>
</html>
