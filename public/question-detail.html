<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Question — Whisperia</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div id="navbar"></div>

  <main class="page-content" style="max-width:900px;margin:0 auto;padding:32px 24px;position:relative;z-index:1">
    <div id="question-content">
      <div class="loading-overlay"><div class="spinner"></div></div>
    </div>
  </main>

  <div id="footer"></div>
  <script src="/js/app.js"></script>
  <script src="/js/components/navbar.js"></script>
  <script src="/js/components/footer.js"></script>
  <script>
    let questionData = null;
    let currentUser = null;

    document.addEventListener('DOMContentLoaded', async () => {
      renderNavbar(); renderFooter();
      currentUser = await getCurrentUser();
      const id = getParam('id');
      if (!id) return navigate('/questions.html');
      await loadQuestion(id);
    });

    async function loadQuestion(id) {
      try {
        const data = await api(`/questions/${id}`);
        questionData = data;
        document.title = `${data.question.title} — Whisperia`;
        renderQuestion(data);
      } catch (err) {
        document.getElementById('question-content').innerHTML =
          `<div class="empty-state"><h3>Question not found</h3><p>${err.message}</p></div>`;
      }
    }

    function renderQuestion(data) {
      const q = data.question;
      const isOwner = currentUser && currentUser.id === q.userId;
      const container = document.getElementById('question-content');

      container.innerHTML = `
        <!-- Question -->
        <div class="glass-card-static" style="padding:32px;margin-bottom:24px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap">
            <span class="tag">${escapeHtml(q.categoryName)}</span>
            ${q.tags.map(t => `<span class="tag" style="background:rgba(6,182,212,0.15);color:#67e8f9">${escapeHtml(t.name)}</span>`).join('')}
          </div>
          <h1 style="font-size:1.6rem;font-weight:700;margin-bottom:16px;line-height:1.4">${escapeHtml(q.title)}</h1>
          <div style="color:var(--color-muted);font-size:0.95rem;line-height:1.7;margin-bottom:20px;white-space:pre-wrap">${escapeHtml(q.description)}</div>
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding-top:16px;border-top:1px solid var(--color-border)">
            <div style="display:flex;align-items:center;gap:10px">
              ${createAvatar(q.author, 32)}
              <div>
                <a href="/profile.html?id=${q.userId}" style="color:var(--color-primary);text-decoration:none;font-weight:600;font-size:0.9rem">${escapeHtml(q.author)}</a>
                <div style="color:var(--color-muted);font-size:0.8rem">asked ${formatDate(q.createdAt)}</div>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              ${currentUser ? `
                <button onclick="toggleBookmark()" class="btn-ghost" id="bookmark-btn" style="${q.isBookmarked ? 'color:var(--color-warning)' : ''}">
                  ${q.isBookmarked ? '★' : '☆'} ${q.bookmarkCount}
                </button>
                <button onclick="showReportModal('question', ${q.id})" class="btn-ghost" style="font-size:0.8rem">🚩 Report</button>
              ` : ''}
              ${isOwner ? `
                <button onclick="deleteQuestion()" class="btn-danger" style="font-size:0.8rem">Delete</button>
              ` : ''}
            </div>
          </div>
        </div>

        <!-- Answers -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <h2 style="font-size:1.2rem;font-weight:700">${q.answerCount} Answer${q.answerCount !== 1 ? 's' : ''}</h2>
        </div>

        <div id="answers-list" style="display:grid;gap:16px;margin-bottom:32px">
          ${data.answers.length === 0 ? '<div class="empty-state" style="padding:30px"><p>No answers yet. Be the first to answer!</p></div>' :
            data.answers.map(a => renderAnswer(a)).join('')}
        </div>

        <!-- Post Answer -->
        ${currentUser ? `
        <div class="glass-card-static" style="padding:32px" id="answer-form-section">
          <h3 style="font-size:1.1rem;font-weight:700;margin-bottom:16px">Your Answer</h3>
          <form id="answer-form">
            <textarea id="answer-text" class="form-input" placeholder="Write your answer..." style="min-height:150px;margin-bottom:16px" required></textarea>
            <button type="submit" class="btn-primary" id="submit-answer-btn">Post Answer</button>
          </form>
        </div>
        ` : `
        <div class="glass-card-static" style="padding:24px;text-align:center">
          <p style="color:var(--color-muted)">
            <a href="/login.html" style="color:var(--color-primary);text-decoration:none;font-weight:600">Sign in</a> to post an answer
          </p>
        </div>
        `}

        <!-- Report Modal -->
        <div id="report-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;display:none;align-items:center;justify-content:center">
          <div class="glass-card-static" style="padding:32px;width:100%;max-width:440px">
            <h3 style="font-size:1.1rem;font-weight:700;margin-bottom:16px">Report Content</h3>
            <textarea id="report-reason" class="form-input" placeholder="Describe why this content is inappropriate..." style="min-height:100px;margin-bottom:16px"></textarea>
            <div style="display:flex;gap:12px;justify-content:flex-end">
              <button onclick="closeReportModal()" class="btn-secondary">Cancel</button>
              <button onclick="submitReport()" class="btn-danger">Submit Report</button>
            </div>
          </div>
        </div>
      `;

      // Attach answer form handler
      const form = document.getElementById('answer-form');
      if (form) {
        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          const btn = document.getElementById('submit-answer-btn');
          btn.disabled = true; btn.textContent = 'Posting...';
          try {
            await api('/answers', {
              method: 'POST',
              body: { questionId: q.id, answerText: document.getElementById('answer-text').value }
            });
            showToast('Answer posted!', 'success');
            await loadQuestion(q.id);
          } catch (err) {
            showToast(err.message, 'error');
            btn.disabled = false; btn.textContent = 'Post Answer';
          }
        });
      }
    }

    function renderAnswer(a) {
      const isOwner = currentUser && currentUser.id === a.userId;
      return `
        <div class="glass-card-static" style="padding:24px;display:flex;gap:16px" id="answer-${a.id}">
          <div style="display:flex;flex-direction:column;align-items:center;gap:4px;min-width:44px">
            <button class="vote-btn ${a.userVote === 'up' ? 'active-up' : ''}" onclick="vote(${a.id}, 'up')">▲</button>
            <span style="font-weight:700;font-size:1.1rem;color:${a.voteTotal > 0 ? 'var(--color-success)' : a.voteTotal < 0 ? 'var(--color-danger)' : 'var(--color-muted)'}" id="vote-total-${a.id}">${a.voteTotal}</span>
            <button class="vote-btn ${a.userVote === 'down' ? 'active-down' : ''}" onclick="vote(${a.id}, 'down')">▼</button>
          </div>
          <div style="flex:1;min-width:0">
            <div style="color:var(--color-text);line-height:1.7;margin-bottom:12px;white-space:pre-wrap;font-size:0.95rem">${escapeHtml(a.answerText)}</div>
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding-top:12px;border-top:1px solid var(--color-border)">
              <div style="display:flex;align-items:center;gap:8px">
                ${createAvatar(a.author, 28)}
                <a href="/profile.html?id=${a.userId}" style="color:var(--color-primary);text-decoration:none;font-weight:500;font-size:0.85rem">${escapeHtml(a.author)}</a>
                <span style="color:var(--color-muted);font-size:0.8rem">• ${formatDate(a.createdAt)}</span>
              </div>
              <div style="display:flex;gap:8px">
                ${currentUser ? `<button onclick="showReportModal('answer', ${a.id})" class="btn-ghost" style="font-size:0.75rem">🚩</button>` : ''}
                ${isOwner ? `<button onclick="deleteAnswer(${a.id})" class="btn-ghost" style="color:var(--color-danger);font-size:0.75rem">Delete</button>` : ''}
              </div>
            </div>
          </div>
        </div>`;
    }

    async function vote(answerId, voteType) {
      if (!currentUser) return navigate('/login.html');
      try {
        const data = await api('/votes', { method: 'POST', body: { answerId, voteType } });
        document.getElementById(`vote-total-${answerId}`).textContent = data.voteTotal;
        showToast(data.message, 'success');
      } catch (err) { showToast(err.message, 'error'); }
    }

    async function toggleBookmark() {
      if (!currentUser) return navigate('/login.html');
      try {
        const data = await api('/bookmarks', { method: 'POST', body: { questionId: questionData.question.id } });
        showToast(`Bookmark ${data.action}`, 'success');
        await loadQuestion(questionData.question.id);
      } catch (err) { showToast(err.message, 'error'); }
    }

    async function deleteQuestion() {
      if (!confirm('Delete this question?')) return;
      try {
        await api(`/questions/${questionData.question.id}`, { method: 'DELETE' });
        showToast('Question deleted', 'success');
        setTimeout(() => navigate('/questions.html'), 500);
      } catch (err) { showToast(err.message, 'error'); }
    }

    async function deleteAnswer(id) {
      if (!confirm('Delete this answer?')) return;
      try {
        await api(`/answers/${id}`, { method: 'DELETE' });
        showToast('Answer deleted', 'success');
        await loadQuestion(questionData.question.id);
      } catch (err) { showToast(err.message, 'error'); }
    }

    let reportTarget = {};
    function showReportModal(type, id) {
      reportTarget = { type, id };
      const modal = document.getElementById('report-modal');
      modal.style.display = 'flex';
    }
    function closeReportModal() {
      document.getElementById('report-modal').style.display = 'none';
      document.getElementById('report-reason').value = '';
    }
    async function submitReport() {
      const reason = document.getElementById('report-reason').value;
      if (!reason || reason.length < 5) return showToast('Please provide a reason', 'error');
      try {
        const body = { reason };
        if (reportTarget.type === 'question') body.questionId = reportTarget.id;
        else body.answerId = reportTarget.id;
        await api('/reports', { method: 'POST', body });
        showToast('Report submitted', 'success');
        closeReportModal();
      } catch (err) { showToast(err.message, 'error'); }
    }
  </script>
</body>
</html>
