<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Whisperia</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div id="navbar"></div>

  <main class="page-content" style="max-width:900px;margin:0 auto;padding:32px 24px;position:relative;z-index:1">
    <div id="profile-content">
      <div class="loading-overlay"><div class="spinner"></div></div>
    </div>
  </main>

  <div id="footer"></div>
  <script src="/js/app.js"></script>
  <script src="/js/components/navbar.js"></script>
  <script src="/js/components/footer.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      renderNavbar(); renderFooter();
      const id = getParam('id');
      if (!id) { const u = await getCurrentUser(); if (u) return navigate(`/profile.html?id=${u.id}`); return navigate('/login.html'); }
      await loadProfile(id);
    });

    async function loadProfile(id) {
      try {
        const data = await api(`/users/${id}`);
        const u = data.user;
        document.title = `${u.username}'s Profile — Whisperia`;

        document.getElementById('profile-content').innerHTML = `
          <!-- Profile Header -->
          <div class="glass-card-static" style="padding:32px;margin-bottom:24px">
            <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
              ${createAvatar(u.username, 72)}
              <div style="flex:1">
                <h1 style="font-size:1.6rem;font-weight:800">${escapeHtml(u.username)}</h1>
                <p style="color:var(--color-muted);font-size:0.9rem">${escapeHtml(u.email)}</p>
                <p style="color:var(--color-muted);font-size:0.85rem">Joined ${formatDate(u.joinDate)}</p>
              </div>
              <div style="text-align:center">
                <div class="stat-number" style="font-size:2rem">${u.reputation}</div>
                <div class="stat-label">Reputation</div>
              </div>
            </div>
          </div>

          <!-- Stats Grid -->
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px">
            <div class="glass-card-static stat-card">
              <div style="font-size:1.5rem;font-weight:700;color:var(--color-primary)">${u.questionsAsked}</div>
              <div class="stat-label">Questions</div>
            </div>
            <div class="glass-card-static stat-card">
              <div style="font-size:1.5rem;font-weight:700;color:#06b6d4">${u.answersPosted}</div>
              <div class="stat-label">Answers</div>
            </div>
            <div class="glass-card-static stat-card">
              <div style="font-size:1.5rem;font-weight:700;color:#22c55e">${u.votesGiven}</div>
              <div class="stat-label">Votes Given</div>
            </div>
            <div class="glass-card-static stat-card">
              <div style="font-size:1.5rem;font-weight:700;color:#f59e0b">${u.bookmarksMade}</div>
              <div class="stat-label">Bookmarks</div>
            </div>
          </div>

          <!-- Tabs -->
          <div style="display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--color-border)">
            <button class="btn-ghost tab-btn active-tab" onclick="showTab('questions')" style="padding-bottom:12px;border-radius:0;border-bottom:2px solid var(--color-primary)">Questions (${data.questions.length})</button>
            <button class="btn-ghost tab-btn" onclick="showTab('answers')" style="padding-bottom:12px;border-radius:0">Answers (${data.answers.length})</button>
          </div>

          <!-- Questions Tab -->
          <div id="tab-questions" style="display:grid;gap:12px">
            ${data.questions.length === 0 ? '<div class="empty-state"><p>No questions yet</p></div>' :
              data.questions.map(q => `
                <a href="/question-detail.html?id=${q.id}" class="glass-card" style="padding:16px 20px;text-decoration:none;display:flex;justify-content:space-between;align-items:center">
                  <div>
                    <h3 style="font-weight:600;color:var(--color-text);font-size:0.95rem">${escapeHtml(q.title)}</h3>
                    <span style="color:var(--color-muted);font-size:0.8rem">${escapeHtml(q.categoryName)} • ${formatDate(q.createdAt)}</span>
                  </div>
                  <span style="color:var(--color-primary);font-weight:600">${q.answerCount} answers</span>
                </a>
              `).join('')}
          </div>

          <!-- Answers Tab -->
          <div id="tab-answers" style="display:none;display:grid;gap:12px">
            ${data.answers.length === 0 ? '<div class="empty-state"><p>No answers yet</p></div>' :
              data.answers.map(a => `
                <a href="/question-detail.html?id=${a.questionId}" class="glass-card" style="padding:16px 20px;text-decoration:none;display:block">
                  <div style="color:var(--color-muted);font-size:0.8rem;margin-bottom:4px">Answered on: ${escapeHtml(a.questionTitle)}</div>
                  <p style="color:var(--color-text);font-size:0.9rem">${escapeHtml(truncate(a.answerText, 200))}</p>
                  <span style="color:var(--color-success);font-size:0.8rem;font-weight:600">▲ ${a.voteTotal} votes</span>
                </a>
              `).join('')}
          </div>
        `;
        document.getElementById('tab-answers').style.display = 'none';
      } catch (err) {
        document.getElementById('profile-content').innerHTML = `<div class="empty-state"><h3>User not found</h3></div>`;
      }
    }

    function showTab(tab) {
      document.getElementById('tab-questions').style.display = tab === 'questions' ? 'grid' : 'none';
      document.getElementById('tab-answers').style.display = tab === 'answers' ? 'grid' : 'none';
      document.querySelectorAll('.tab-btn').forEach(b => {
        b.style.borderBottom = '2px solid transparent';
      });
      event.target.style.borderBottom = '2px solid var(--color-primary)';
    }
  </script>
</body>
</html>
